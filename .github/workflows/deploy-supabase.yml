# Deploys Casilla 588's Supabase backend (migrations + edge function) on push
# to main when anything under supabase/ changes. Also runnable manually from
# the Actions tab.
#
# Required GitHub secrets (Settings -> Secrets and variables -> Actions -> Secrets):
#   SUPABASE_ACCESS_TOKEN   - personal access token from https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF    - the project ref (alphanumeric ID, visible in the
#                             URL of your Supabase dashboard)
#   SUPABASE_DB_PASSWORD    - the database password set when the project was created
#   IP_HASH_SALT            - random secret (~32 chars) used by the edge function
#                             to hash IPs for rate-limiting. Generate once with
#                             `openssl rand -hex 32`. No rotation needed; the function
#                             mixes it with the calendar day for daily de-correlation.
#
# Optional GitHub variable (Variables tab, NOT Secrets — it's a public URL):
#   ALLOWED_ORIGIN          - comma-separated list of origins allowed by CORS.
#                             Example: "https://casilla588.es,https://carloxavier.github.io"
#                             If unset, the function defaults to https://casilla588.es only.
#
# SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY are auto-injected into the function
# runtime by Supabase - you do NOT need to set them here.
#
# This workflow only references vars/secrets contexts; it does not read any
# user-controlled github.event.* fields, so it is not exposed to workflow
# injection.

name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/deploy-supabase.yml"
  workflow_dispatch:

concurrency:
  group: supabase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push database migrations
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push

      - name: Set required edge function secrets
        env:
          IP_HASH_SALT: ${{ secrets.IP_HASH_SALT }}
        run: supabase secrets set IP_HASH_SALT="$IP_HASH_SALT"

      - name: Set ALLOWED_ORIGIN (optional)
        if: vars.ALLOWED_ORIGIN != ''
        env:
          ALLOWED_ORIGIN: ${{ vars.ALLOWED_ORIGIN }}
        run: supabase secrets set ALLOWED_ORIGIN="$ALLOWED_ORIGIN"

      - name: Deploy edge function
        run: supabase functions deploy waitlist-signup
